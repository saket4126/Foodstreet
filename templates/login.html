<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FoodStreet - Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff6b35,#ff914d);
}

.login-container{
    width:400px;
    background:#fff;
    padding:35px;
    border-radius:15px;
    box-shadow:0 15px 30px rgba(0,0,0,.25);
}

.logo{
    text-align:center;
    margin-bottom:25px;
}

.logo h1{
    color:#ff6b35;
    font-size:38px;
    margin-bottom:8px;
}

.logo p{
    color:#666;
    font-size:16px;
}

.input-group{
    margin-bottom:18px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
    color:#333;
}

.input-group input{
    width:100%;
    padding:13px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
    transition:.3s;
}

.input-group input:focus{
    border-color:#ff6b35;
    outline:none;
    box-shadow:0 0 8px rgba(255,107,53,.3);
}

.options{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
    font-size:14px;
}

.options label{
    color:#444;
}

.options a{
    color:#ff6b35;
    text-decoration:none;
}

.options a:hover{
    text-decoration:underline;
}

.login-btn{
    width:100%;
    padding:14px;
    border:none;
    background:#ff6b35;
    color:white;
    font-size:18px;
    border-radius:8px;
    cursor:pointer;
    transition:.3s;
}

.login-btn:hover{
    background:#e65a27;
}

.or{
    text-align:center;
    margin:20px 0;
    color:#888;
    font-weight:bold;
}

.google-btn{
    width:100%;
    padding:13px;
    background:white;
    border:1px solid #ccc;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    transition:.3s;
}

.google-btn:hover{
    background:#f5f5f5;
}

.register{
    margin-top:25px;
    text-align:center;
    color:#555;
}

.register a{
    color:#ff6b35;
    font-weight:bold;
    text-decoration:none;
}

.register a:hover{
    text-decoration:underline;
}

.footer{
    text-align:center;
    margin-top:20px;
    color:#888;
    font-size:13px;
}

@media(max-width:450px){

.login-container{
    width:90%;
    padding:25px;
}

.logo h1{
    font-size:32px;
}

}

</style>

</head>
<body>

<div class="login-container">

    <div class="logo">
        <h1>🍔 FoodStreet</h1>
        <p>Welcome Back! Login to continue</p>
    </div>

    <form action="/login" method="POST">

        <div class="input-group">
            <label>Email Address or Mobile Number</label>
            <input
                type="text"
                name="login"
                placeholder="Enter Email or Mobile Number"
                required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input
                type="password"
                name="password"
                placeholder="Enter Password"
                required>
        </div>

        <div class="options">

            <label>
                <input type="checkbox" name="remember">
                Remember Me
            </label>

            <a href="/forgot-password">Forgot Password?</a>

        </div>

        <button type="submit" class="login-btn">
            Login
        </button>

    </form>

    <div class="or">
        OR
    </div>

    <button class="google-btn">
        Continue with Google
    </button>

    <div class="register">
        Don't have an account?
        <a href="/register">Register Now</a>
    </div>

    <div class="footer">
        © 2026 FoodStreet. All Rights Reserved.
    </div>

</div>

</body>
</html>
