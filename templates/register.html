<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FoodStreet | Register</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff6b35,#ff914d);
}

.container{

width:450px;
background:white;
padding:35px;
border-radius:15px;
box-shadow:0px 10px 30px rgba(0,0,0,.25);

}

.container h1{

text-align:center;
color:#ff6b35;
margin-bottom:10px;

}

.container p{

text-align:center;
color:gray;
margin-bottom:25px;

}

.input-group{

margin-bottom:18px;

}

.input-group label{

display:block;
margin-bottom:8px;
font-weight:bold;

}

.input-group input{

width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
font-size:15px;

}

.input-group input:focus{

outline:none;
border-color:#ff6b35;

}

button{

width:100%;
padding:14px;
background:#ff6b35;
border:none;
border-radius:8px;
color:white;
font-size:18px;
cursor:pointer;

}

button:hover{

background:#e65a27;

}

.login{

text-align:center;
margin-top:20px;

}

.login a{

color:#ff6b35;
text-decoration:none;
font-weight:bold;

}

</style>

</head>

<body>

<div class="container">

<h1>🍔 FoodStreet</h1>

<p>Create Your Account</p>

<form action="/register" method="POST">

<div class="input-group">

<label>Full Name</label>

<input
type="text"
name="name"
placeholder="Enter Full Name"
required>

</div>

<div class="input-group">

<label>Email Address</label>

<input
type="email"
name="email"
placeholder="Enter Email Address"
required>

</div>

<div class="input-group">

<label>Mobile Number</label>

<input
type="tel"
name="mobile"
placeholder="Enter Mobile Number"
maxlength="10"
required>

</div>

<div class="input-group">

<label>Password</label>

<input
type="password"
name="password"
placeholder="Create Password"
required>

</div>

<div class="input-group">

<label>Confirm Password</label>

<input
type="password"
name="confirm_password"
placeholder="Confirm Password"
required>

</div>

<button type="submit">

Register

</button>

</form>

<div class="login">

Already have an account?

<a href="/login">

Login

</a>

</div>

</div>

</body>

</html>
